{% extends 'base.html' %}

{% block content %}


<h1>Sign up</h1>

<h3> {{error}} </h3>

<form action="" method="POST">
    {% csrf_token %}
    {{ form.username.label }}
    {{ form.username}}
    <br>
    {{ form.email.label }}
    {{ form.email }}
    <br>
    {{ form.password1.label }}
    {{ form.password1 }}
    <br>
    {{ form.password2.label }}
    {{ form.password2 }}
    <br>
    <button type="submit">Sign up</button>
</form>

{% endblock %}
